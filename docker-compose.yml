version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: netra_db
    ports:
      - "13306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mount schema.sql to automatically initialize the database
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "9876:9876"
    depends_on:
      - db
    environment:
      - DB_USER=root
      - DB_PASS=secret
      - DB_HOST=db:3306
      - DB_NAME=netra_db
      - PORT=9876

volumes:
  db_data:
