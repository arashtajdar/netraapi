server {
    listen 80;
    listen [::]:80;
    server_name api.netra.local;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Standard REST API Routing (Auth, Movies, Gamification)
    location /api/ {
        proxy_pass http://127.0.0.1:9876;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Watch Party WebSocket Upgrader
    location /ws/ {
        proxy_pass http://127.0.0.1:9876;
        
        # Critical WebSocket Upgrade Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Keep connection open for long watch parties (e.g., typical 2-hour movies)
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    # Block hidden files like .env just in case Nginx serves static directories accidentally
    location ~ /\. {
        deny all;
    }
}
