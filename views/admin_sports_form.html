{{ define "content" }}
<div class="mb-6">
    <a href="/admin/sports" class="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-2 mb-4">
        <span>&larr;</span> Back to Sports Events
    </a>
    <h1 class="text-3xl font-bold text-white">Add Sports Event</h1>
</div>

<div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg p-6 max-w-4xl">
    <form action="/admin/sports/new" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Event Title *</label>
                <input type="text" name="title" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Start Time</label>
                <input type="datetime-local" name="start_time" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Description</label>
            <textarea name="description" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"></textarea>
        </div>

        <div class="border border-gray-700 rounded-lg p-4 bg-gray-900/50">
            <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" name="is_live" value="true" class="form-checkbox h-5 w-5 text-blue-600 bg-gray-900 border-gray-700 rounded focus:ring-blue-500 focus:ring-offset-gray-900">
                <span class="text-white font-medium">Event is Currently LIVE</span>
            </label>
            <p class="text-xs text-gray-500 mt-2">If checked, the Live Stream URL below will be used. If unchecked, the Video Sources (VOD) will be used instead.</p>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Live Stream URL</label>
                <input type="url" name="live_stream_url" placeholder="https://.../m3u8" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Video Sources (JSON Array for VOD)</label>
                <textarea name="video_sources" rows="3" placeholder='[{"quality": "1080p", "url": "https://..."}]' class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 font-mono text-sm"></textarea>
            </div>
        </div>

        <div class="pt-4 border-t border-gray-700 flex justify-end">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-lg shadow-blue-600/20">
                Save Sports Event
            </button>
        </div>
    </form>
</div>
{{ end }}
