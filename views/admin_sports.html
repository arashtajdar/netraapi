{{ define "content" }}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-white">Manage Sports Events</h1>
    <a href="/admin/sports/new" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors inline-block">
        + Add Event
    </a>
</div>
<div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-lg">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-gray-900/50 text-gray-400 text-sm uppercase tracking-wider">
                <th class="p-4 font-semibold">Event Title</th>
                <th class="p-4 font-semibold">Live Status</th>
                <th class="p-4 font-semibold">Start Time</th>
                <th class="p-4 font-semibold">Actions</th>
            </tr>
        </thead>
        <tbody class="text-gray-200 text-sm divide-y divide-gray-700">
            {{ range .Events }}
            <tr class="hover:bg-gray-700/50 transition-colors">
                <td class="p-4 font-medium">{{ .Title }}</td>
                <td class="p-4">
                    {{ if .IsLive }}
                    <span class="bg-red-500 text-white px-2 py-1 rounded text-xs font-bold animate-pulse">LIVE</span>
                    {{ else }}
                    <span class="bg-gray-600 text-gray-300 px-2 py-1 rounded text-xs font-bold">UPCOMING / ENDED</span>
                    {{ end }}
                </td>
                <td class="p-4">{{ .StartTime }}</td>
                <td class="p-4 space-x-2">
                    <button class="text-blue-400 hover:text-blue-300">Edit</button>
                </td>
            </tr>
            {{ else }}
            <tr>
                <td colspan="4" class="p-8 text-center text-gray-500">No sports events found. Add one above!</td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ end }}
