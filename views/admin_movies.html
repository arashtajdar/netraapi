{{ define "content" }}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-white">Manage Movies</h1>
    <a href="/admin/movies/new" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
        + Add Movie
    </a>
</div>

<div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-lg">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-gray-900/50 text-gray-400 text-sm uppercase tracking-wider">
                <th class="p-4 font-semibold">Title</th>
                <th class="p-4 font-semibold">Director</th>
                <th class="p-4 font-semibold">Rating</th>
                <th class="p-4 font-semibold">Actions</th>
            </tr>
        </thead>
        <tbody class="text-gray-200 text-sm divide-y divide-gray-700">
            <!-- Dynamic loop placeholder for movies -->
            <tr class="hover:bg-gray-700/50 transition-colors">
                <td class="p-4 font-medium">Inception (Placeholder)</td>
                <td class="p-4">Christopher Nolan</td>
                <td class="p-4 text-yellow-400">8.8</td>
                <td class="p-4 space-x-2">
                    <button class="text-blue-400 hover:text-blue-300 transition-colors">Edit</button>
                    <button class="text-red-400 hover:text-red-300 transition-colors">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
{{ end }}
