{{ define "content" }}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-white">Manage Users</h1>
</div>

<div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-lg">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-gray-900 border-b border-gray-700 text-gray-400 text-sm uppercase tracking-wider">
                <th class="p-4 font-semibold">ID</th>
                <th class="p-4 font-semibold">Username</th>
                <th class="p-4 font-semibold">Email</th>
                <th class="p-4 font-semibold">Virtual Coins</th>
                <th class="p-4 font-semibold text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-700">
            {{ range .Users }}
            <tr class="hover:bg-gray-700/50 transition-colors">
                <td class="p-4 text-gray-400 text-sm">#{{ .ID }}</td>
                <td class="p-4 text-white font-medium">{{ .Username }}</td>
                <td class="p-4 text-gray-300">{{ .Email }}</td>
                <td class="p-4 text-yellow-400 font-mono">{{ .VirtualCoins }}</td>
                <td class="p-4 text-right">
                    <a href="/admin/users/edit/{{ .ID }}" class="text-blue-400 hover:text-blue-300 transition-colors text-sm font-medium">Edit</a>
                    <form action="/admin/users/delete/{{ .ID }}" method="POST" class="inline" onsubmit="return confirm('Are you sure you want to permanently delete this user?');">
                        <button type="submit" class="text-red-400 hover:text-red-300 ml-3 transition-colors text-sm font-medium">Delete</button>
                    </form>
                </td>
            </tr>
            {{ else }}
            <tr>
                <td colspan="5" class="p-8 text-center text-gray-400 italic">No users found.</td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ end }}
