{{ define "content" }}
<div class="mb-6">
    <a href="/admin/movies" class="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-2 mb-4">
        <span>&larr;</span> Back to Movies
    </a>
    <h1 class="text-3xl font-bold text-white">Add New Movie</h1>
</div>

<div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg p-6 max-w-4xl">
    <form action="/admin/movies/new" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Title *</label>
                <input type="text" name="title" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Director</label>
                <input type="text" name="director" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Release Date</label>
                <input type="date" name="release_date" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">IMDb Rating</label>
                    <input type="number" step="0.1" name="imdb_rating" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Local Rating</label>
                    <input type="number" step="0.1" name="local_rating" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                </div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Description</label>
            <textarea name="description" rows="4" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Poster URL</label>
                <div class="flex gap-2">
                    <input type="url" id="poster_url" name="poster_url" class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                    <label class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg cursor-pointer transition-colors flex items-center justify-center whitespace-nowrap text-sm font-medium">
                        Upload File
                        <input type="file" class="hidden" accept="image/*" onchange="uploadFile(this, 'poster_url', false)">
                    </label>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Backdrop URL</label>
                <div class="flex gap-2">
                    <input type="url" id="backdrop_url" name="backdrop_url" class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                    <label class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg cursor-pointer transition-colors flex items-center justify-center whitespace-nowrap text-sm font-medium">
                        Upload File
                        <input type="file" class="hidden" accept="image/*" onchange="uploadFile(this, 'backdrop_url', false)">
                    </label>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Intro Start (seconds)</label>
                <input type="number" name="intro_start" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Intro End (seconds)</label>
                <input type="number" name="intro_end" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Video Sources (JSON Array)</label>
                <div class="flex gap-2 mb-2">
                    <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg cursor-pointer transition-colors text-sm font-medium">
                        &#8679; Upload Video
                        <input type="file" class="hidden" accept="video/*" onchange="uploadFile(this, 'video_sources', true)">
                    </label>
                </div>
                <textarea id="video_sources" name="video_sources" rows="3" placeholder='[{"quality": "1080p", "url": "https://..."}]' class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 font-mono text-sm"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Subtitles (JSON Object)</label>
                <textarea name="subtitles" rows="3" placeholder='{"en": "url.vtt", "es": "url.vtt"}' class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 font-mono text-sm"></textarea>
            </div>
        </div>

        <div class="pt-4 border-t border-gray-700 flex justify-end">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-lg shadow-blue-600/20">
                Save Movie
            </button>
        </div>
    </form>
</div>

<script>
async function uploadFile(inputElem, targetElemId, isJsonArray) {
    const file = inputElem.files[0];
    if (!file) return;
    
    const targetInput = document.getElementById(targetElemId);
    const oldVal = targetInput.value;
    targetInput.value = "Uploading " + file.name + "... Please wait!";
    inputElem.parentElement.classList.add("opacity-50", "pointer-events-none");
    
    const formData = new FormData();
    formData.append("file", file);
    
    try {
        const res = await fetch("/admin/upload", {
            method: "POST",
            body: formData
        });
        
        if (!res.ok) {
            const txt = await res.text();
            throw new Error(txt);
        }
        
        const data = await res.json();
        
        if (data.url) {
            if (isJsonArray) {
                const json = JSON.stringify([{ "quality": "Original", "url": data.url }], null, 2);
                targetInput.value = json;
            } else {
                targetInput.value = data.url;
            }
        } else {
            targetInput.value = oldVal;
            alert("Upload failed.");
        }
    } catch(e) {
        targetInput.value = oldVal;
        alert("Upload error: " + e.message);
    }
    inputElem.parentElement.classList.remove("opacity-50", "pointer-events-none");
}
</script>
{{ end }}
