{{ define "content" }}
<div class="max-w-4xl">
    <div class="mb-6">
        <a href="/admin/music" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
            <span>← Back to Music</span>
        </a>
    </div>

    <div class="bg-gray-800 rounded-xl border border-gray-700 p-8 shadow-xl">
        <h1 class="text-2xl font-bold text-white mb-6">Add New Music</h1>
        
        <form action="/admin/music/new" method="POST" class="space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Title *</label>
                    <input type="text" name="title" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Artist</label>
                    <input type="text" name="artist" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
                    <textarea name="description" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Release Date</label>
                    <input type="date" name="release_date" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500" style="color-scheme: dark;">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Poster URL</label>
                    <input type="url" name="poster_url" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Backdrop URL</label>
                    <input type="url" name="backdrop_url" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Video Source URL (Optional)</label>
                    <input type="url" name="video_url" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="pt-6 border-t border-gray-700 flex justify-end">
                <button type="submit" class="px-6 py-2 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-medium rounded-lg shadow-lg">Save Music</button>
            </div>
        </form>
    </div>
</div>
{{ end }}
